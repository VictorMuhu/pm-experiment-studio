name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "projects/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build projects
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site/projects/2026-03-17-idea-validator
          cp -r projects/2026-03-17-idea-validator/. _site/projects/2026-03-17-idea-validator/
          printf '<!doctype html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=projects/2026-03-17-idea-validator/"></head><body>Redirecting...</body></html>\n' > _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
