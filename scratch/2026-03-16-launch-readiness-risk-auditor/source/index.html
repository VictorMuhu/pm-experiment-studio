<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Master Prompt Spec Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app" id="app">
    <header class="topbar">
      <div class="topbar__title">
        <div class="topbar__kicker">LAUNCH READINESS</div>
        <h1 class="topbar__h1">Go/No-Go</h1>
      </div>
      <div class="topbar__meta" id="lastUpdated" aria-live="polite"></div>
    </header>

    <main class="main" aria-label="Launch readiness dashboard">
      <section class="grid" aria-label="Widget tiles">
        <article class="tile tile--wide tile--hero" id="tileHero" aria-label="Overall readiness tile">
          <div class="tile__row">
            <div class="label">READINESS</div>
            <div class="tag" id="riskTag">
              <span class="tag__dot" aria-hidden="true"></span>
              <span class="tag__text" id="riskTagText">ON TRACK</span>
            </div>
          </div>
          <div class="hero">
            <div class="hero__value" id="readinessScore" aria-label="Readiness score">—</div>
            <div class="hero__suffix">/100</div>
          </div>
          <div class="tile__sub" id="heroSub">—</div>
        </article>

        <article class="tile" aria-label="Blockers tile">
          <div class="label">BLOCKERS</div>
          <div class="value value--xl" id="blockerCount">—</div>
          <div class="secondary" id="blockerSub">—</div>
        </article>

        <article class="tile" aria-label="Owners tile">
          <div class="label">OWNERS</div>
          <div class="value value--xl" id="ownerCoverage">—</div>
          <div class="secondary" id="ownerSub">—</div>
        </article>

        <article class="tile tile--wide" aria-label="Top risk tile">
          <div class="tile__row">
            <div class="label">TOP RISK</div>
            <div class="pill" id="topRiskPill">—</div>
          </div>
          <div class="value value--md" id="topRiskTitle">—</div>
          <div class="secondary" id="topRiskDetail">—</div>
        </article>

        <article class="tile tile--wide" aria-label="Next action tile">
          <div class="tile__row">
            <div class="label">NEXT ACTION</div>
            <div class="pill pill--accent">TODAY</div>
          </div>
          <div class="value value--md" id="nextActionTitle">—</div>
          <div class="secondary" id="nextActionDetail">—</div>
        </article>
      </section>

      <section class="panel" id="panelChecklist" aria-label="Checklist panel">
        <div class="panel__header">
          <div class="panel__title">
            <div class="panel__kicker">CHECKLIST</div>
            <h2 class="panel__h2">Blocking items by owner</h2>
          </div>

          <div class="panel__actions">
            <button class="btn btn--primary" id="btnExport" type="button">EXPORT CHECKLIST</button>
          </div>
        </div>

        <div class="list" id="ownerList" role="list" aria-label="Owners list">
          <!-- injected -->
        </div>
      </section>

      <section class="panel panel--compact" aria-label="Notes panel">
        <div class="panel__header panel__header--row">
          <div>
            <div class="panel__kicker">NOTES</div>
            <h2 class="panel__h2 panel__h2--small">Launch context</h2>
          </div>
          <button class="btn btn--ghost" id="btnReset" type="button" aria-label="Reset demo data to defaults">RESET DEMO</button>
        </div>

        <div class="metaGrid" aria-label="Launch metadata tiles">
          <div class="metaTile">
            <div class="label">LAUNCH</div>
            <div class="value value--sm" id="metaLaunchName">—</div>
          </div>
          <div class="metaTile">
            <div class="label">DATE</div>
            <div class="value value--sm" id="metaLaunchDate">—</div>
          </div>
          <div class="metaTile">
            <div class="label">SEGMENT</div>
            <div class="value value--sm" id="metaSegment">—</div>
          </div>
          <div class="metaTile">
            <div class="label">PLATFORM</div>
            <div class="value value--sm" id="metaPlatform">—</div>
          </div>
        </div>
      </section>
    </main>

    <nav class="tabbar" aria-label="Primary">
      <button class="tab tab--active" type="button" data-tab="dashboard" aria-current="page">
        <span class="tab__icon" aria-hidden="true">●</span>
        <span class="tab__label">DASHBOARD</span>
      </button>
      <button class="tab" type="button" data-tab="checklist">
        <span class="tab__icon" aria-hidden="true">◻</span>
        <span class="tab__label">CHECKLIST</span>
      </button>
      <button class="tab" type="button" data-tab="risks">
        <span class="tab__icon" aria-hidden="true">▲</span>
        <span class="tab__label">RISKS</span>
      </button>
      <button class="tab" type="button" data-tab="about">
        <span class="tab__icon" aria-hidden="true">i</span>
        <span class="tab__label">ABOUT</span>
      </button>
    </nav>

    <div class="sheet" id="sheet" aria-hidden="true" role="dialog" aria-label="Exported checklist">
      <div class="sheet__backdrop" id="sheetBackdrop"></div>
      <div class="sheet__panel" role="document">
        <div class="sheet__header">
          <div>
            <div class="panel__kicker">EXPORT</div>
            <h3 class="sheet__h3">Paste-ready checklist</h3>
          </div>
          <button class="btn btn--ghost" id="btnCloseSheet" type="button" aria-label="Close export">CLOSE</button>
        </div>
        <div class="sheet__body">
          <textarea class="export" id="exportText" readonly spellcheck="false" aria-label="Export text"></textarea>
          <button class="btn btn--primary" id="btnCopy" type="button">COPY</button>
          <div class="copyStatus" id="copyStatus" aria-live="polite"></div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" aria-live="polite" aria-atomic="true"></div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
